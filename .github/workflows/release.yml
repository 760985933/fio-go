name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ==================== CLI 模式编译 ====================
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build CLI binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/nettopo_test_cli_linux_amd64       ./cmd/cli/
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/nettopo_test_cli_darwin_amd64      ./cmd/cli/
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/nettopo_test_cli_darwin_arm64      ./cmd/cli/
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/nettopo_test_cli_windows_amd64.exe ./cmd/cli/

      - name: Package CLI binaries
        working-directory: dist
        run: |
          zip nettopo_test_cli_linux_amd64.zip    nettopo_test_cli_linux_amd64
          zip nettopo_test_cli_darwin_amd64.zip   nettopo_test_cli_darwin_amd64
          zip nettopo_test_cli_darwin_arm64.zip   nettopo_test_cli_darwin_arm64
          zip nettopo_test_cli_windows_amd64.zip  nettopo_test_cli_windows_amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/*.zip

  # ==================== Desktop 模式编译 (Wails) ====================
  build-desktop-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Clean go build cache
        run: go clean -cache

      - name: Build macOS universal
        run: |
          wails build -platform darwin/universal -trimpath -ldflags="-s -w" -o nettopo_test

      - name: Package macOS desktop
        run: |
          mkdir -p dist
          cp build/bin/nettopo_test dist/
          cd dist && zip -r nettopo_test_macos_universal.zip nettopo_test

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: dist/nettopo_test_macos_universal.zip

  build-desktop-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Windows
        run: wails build -trimpath -ldflags="-s -w" -o nettopo_test.exe

      - name: Package Windows desktop
        run: |
          mkdir dist -Force
          Compress-Archive -Path build/bin/nettopo_test.exe -DestinationPath dist/nettopo_test_windows_amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: dist/nettopo_test_windows_amd64.zip

  build-desktop-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Linux
        run: wails build -trimpath -ldflags="-s -w" -o nettopo_test

      - name: Package Linux desktop
        run: |
          mkdir -p dist
          cp build/bin/nettopo_test dist/
          cd dist && zip nettopo_test_linux_amd64.zip nettopo_test

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: dist/nettopo_test_linux_amd64.zip

  # ==================== 发布 ====================
  release:
    needs: [build-cli, build-desktop-macos, build-desktop-windows, build-desktop-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## NetTopo 性能测试工具 ${{ github.ref_name }}

            ---

            ### 下载说明

            | 文件 | 平台 | 说明 |
            |------|------|------|
            | `nettopo_test_cli_linux_amd64.zip` | Linux | CLI 模式，命令行直接运行 |
            | `nettopo_test_cli_darwin_amd64.zip` | macOS Intel | CLI 模式 |
            | `nettopo_test_cli_darwin_arm64.zip` | macOS Apple Silicon | CLI 模式 |
            | `nettopo_test_cli_windows_amd64.zip` | Windows | CLI 模式 |
            | `nettopo_test_macos_universal.zip` | macOS Universal | 桌面 GUI 应用，双击运行 |
            | `nettopo_test_windows_amd64.zip` | Windows | 桌面 GUI 应用，双击运行 |
            | `nettopo_test_linux_amd64.zip` | Linux amd64 | 桌面 GUI 应用 |

            ---

            ### CLI 模式使用

            ```bash
            # 直接分析数据并生成报告
            ./nettopo_test_cli -data /path/to/fio/data -output-dir ./output

            # 启动 Web 管理界面 (默认端口 8080)
            ./nettopo_test_cli -web -port 8080

            # 无参数时默认启动 Web 模式
            ./nettopo_test_cli
            ```

            **参数说明：**
            - `-data`: FIO JSON 数据所在目录（默认 `./data`）
            - `-output-dir`: 报告输出目录（默认 `./output`）
            - `-web`: 启动 Web GUI 模式
            - `-port`: Web 服务端口（默认 8080）

            ---

            ### Desktop 桌面模式使用

            1. 下载对应平台的桌面应用 ZIP 包并解压
            2. macOS: 双击 `nettopo_test` 运行（首次可能需要在「系统偏好设置 → 安全性」中允许）
            3. Windows: 双击 `nettopo_test.exe` 运行
            4. Linux: `chmod +x nettopo_test && ./nettopo_test`

            **桌面模式功能：**
            - FIO 配置可视化编辑器
            - 远程主机 SSH 管理与任务执行
            - 测试结果自动拉取与报告生成
            - 任务编排（多场景顺序执行）

            ---

            ### 前置要求

            - **CLI/Web 模式**: 目标机器需安装 [FIO](https://github.com/axboe/fio)
            - **远程执行**: 需要 SSH 密钥或密码认证
            - **桌面模式**: 无需额外依赖，开箱即用

            ---

            ### 从源码编译

            ```bash
            # CLI 模式
            go build -o nettopo_test_cli ./cmd/cli/

            # Desktop 模式 (需要 Wails CLI)
            go install github.com/wailsapp/wails/v2/cmd/wails@latest
            cd frontend && npm install && cd ..
            wails build
            ```
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
