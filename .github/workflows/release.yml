name: Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的 tag 时触发，例如 v1.0.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build for Linux
        run: GOOS=linux GOARCH=amd64 go build -v -o fio-go-linux-amd64 main.go

      - name: Build for macOS (Intel)
        run: GOOS=darwin GOARCH=amd64 go build -v -o fio-go-darwin-amd64 main.go

      - name: Build for macOS (Apple Silicon)
        run: GOOS=darwin GOARCH=arm64 go build -v -o fio-go-darwin-arm64 main.go

      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -v -o fio-go-windows-amd64.exe main.go

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            fio-go-linux-amd64
            fio-go-darwin-amd64
            fio-go-darwin-arm64
            fio-go-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
